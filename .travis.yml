os:
  - linux
language: rust
rust:
  - stable
cache: 
  - apt
matrix:
  include:
    - arch: arm64
      env:
      - NAME=telegram-bot-template
      - TARGET=armv7-unknown-linux-gnueabihf
      - LINKER=arm-linux-gnueabihf-gcc
      - PACKAGE=$NAME-rpi3.tar.gz
      - OPENSSL_LIB_DIR=/usr/lib/arm-linux-gnueabihf
      - OPENSSL_INCLUDE_DIR=/usr/include/openssl
      - PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
      before_install:
        - sudo dpkg --add-architecture armhf
        - echo "deb http://ports.ubuntu.com/ubuntu-ports xenial main" | sudo tee -a /etc/apt/sources.list
        - sudo apt-get update -yq
        - |-
          sudo apt-get -yq install \
            crossbuild-essential-armhf \
            libc6:armhf \
            libc6-dev:armhf \
            libssl-dev:armhf \
            pkg-config:armhf
        - pkg-config --libs openssl
    - env:
      - NAME=telegram-bot-template
      - TARGET=x86_64-unknown-linux-gnu
      - PACKAGE=$NAME-x86_64.tar.gz
      addons:
        apt:
          packages:
            - libssl-dev

install:
  - export PATH="$PATH:$HOME/.cargo/bin"
  - rustup target add $TARGET || true
  - |
    if [ -n "$LINKER" ]; then
      mkdir -p ~/.cargo
      echo >> ~/.cargo/config
      echo "[target.$TARGET]" >> ~/.cargo/config
      echo "linker = \"$LINKER\"" >> ~/.cargo/config
    fi
script:
  - |
    if [ $TARGET = "x86_64-unknown-linux-gnu" ]; then
      cargo test
    fi
  - cargo build --target $TARGET --verbose --release

before_deploy:
  - tar -czf $PACKAGE -C target/$TARGET/release/ $NAME

deploy:
  provider: releases
  api_key:
    secure: 
  file: ${PACKAGE}
  skip_cleanup: true
  draft: true
